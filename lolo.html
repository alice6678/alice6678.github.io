<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TA3LII9A</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;700&family=Cairo:wght@300;500&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
overflow-x:hidden;
}

body{
background:#050505;
font-family:'Cormorant Garamond',serif;
color:white;
overflow-x:hidden;
perspective:1800px;
}

body::before{
content:'';
position:fixed;
inset:0;
background:
radial-gradient(circle at top left, rgba(255,255,255,0.04), transparent 25%),
radial-gradient(circle at bottom right, rgba(255,255,255,0.03), transparent 20%);
pointer-events:none;
z-index:-1;
}

.hero{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
position:relative;
overflow:hidden;
}

.logo{
font-size:6rem;
letter-spacing:18px;
font-weight:700;
text-transform:uppercase;
color:#f5f5f5;
text-shadow:
0 0 20px rgba(255,255,255,0.08),
0 0 60px rgba(255,255,255,0.04);
transform:translateZ(100px);
}

.slogan{
position:absolute;
font-family:'Cairo',sans-serif;
font-size:2rem;
opacity:.06;
letter-spacing:2px;
transform:translateZ(-200px);
}

.gallery{
width:100%;
}

.panel{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
position:relative;
transform-style:preserve-3d;
}

.poster-card{
width:340px;
height:500px;
position:relative;
transform-style:preserve-3d;
transition:transform .2s ease;
}

.frame{
position:absolute;
inset:0;
padding:18px;
background:#111;
border:1px solid rgba(255,255,255,0.1);
border-radius:18px;
box-shadow:
0 0 60px rgba(255,255,255,0.05),
0 40px 80px rgba(0,0,0,.7);
transform-style:preserve-3d;
backdrop-filter:blur(8px);
}

.frame img{
width:100%;
height:100%;
object-fit:cover;
border-radius:10px;
}

.poster-info{
position:absolute;
bottom:-95px;
left:50%;
transform:translateX(-50%) translateZ(60px);
text-align:center;
width:100%;
}

.poster-info h2{
font-size:2rem;
margin-bottom:10px;
}

.price{
font-size:1.4rem;
letter-spacing:4px;
opacity:.8;
margin-bottom:18px;
}

.buy-btn{
display:inline-flex;
align-items:center;
justify-content:center;
padding:14px 38px;
border-radius:40px;
border:1px solid rgba(255,255,255,0.15);
background:rgba(255,255,255,0.05);
color:white;
text-decoration:none;
font-family:'Cairo',sans-serif;
backdrop-filter:blur(10px);
transition:.4s;
animation:pulse 2s infinite;
}

.buy-btn:hover{
transform:scale(1.08);
background:white;
color:black;
}

@keyframes pulse{
0%{box-shadow:0 0 0 rgba(255,255,255,0);}
50%{box-shadow:0 0 30px rgba(255,255,255,.15);}
100%{box-shadow:0 0 0 rgba(255,255,255,0);}
}

.upload-section{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:80px 20px;
}

.upload-box{
width:700px;
max-width:100%;
padding:80px 40px;
border-radius:30px;
background:rgba(255,255,255,0.04);
border:1px solid rgba(255,255,255,0.1);
backdrop-filter:blur(18px);
text-align:center;
position:relative;
overflow:hidden;
transition:.4s;
}

.upload-box:hover{
transform:translateY(-8px);
}

.upload-box h2{
font-family:'Cairo',sans-serif;
font-size:2rem;
font-weight:300;
margin-bottom:20px;
}

.upload-box p{
opacity:.6;
}

.upload-box.active{
border-color:white;
box-shadow:0 0 60px rgba(255,255,255,.15);
}

footer{
padding:80px 20px;
display:flex;
justify-content:center;
gap:40px;
flex-wrap:wrap;
border-top:1px solid rgba(255,255,255,0.08);
}

footer a{
color:white;
text-decoration:none;
font-size:1.1rem;
letter-spacing:2px;
opacity:.7;
transition:.4s;
}

footer a:hover{
opacity:1;
transform:translateY(-3px);
}

.audio-toggle{
position:fixed;
top:25px;
right:25px;
width:60px;
height:60px;
border-radius:50%;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.08);
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
z-index:999;
backdrop-filter:blur(10px);
}

.bars{
display:flex;
gap:4px;
align-items:flex-end;
height:24px;
}

.bar{
width:4px;
background:white;
border-radius:10px;
animation:sound 1s infinite ease-in-out;
}

.bar:nth-child(2){
animation-delay:.2s;
}

.bar:nth-child(3){
animation-delay:.4s;
}

@keyframes sound{
0%,100%{
height:8px;
}
50%{
height:24px;
}
}

@media(max-width:768px){

.logo{
font-size:3rem;
letter-spacing:8px;
text-align:center;
padding:0 20px;
}

.poster-card{
width:280px;
height:420px;
}

.poster-info h2{
font-size:1.5rem;
}

}

</style>
</head>

<body>

<script>

gsap.registerPlugin(ScrollTrigger);

gsap.utils.toArray(".panel").forEach((panel,i)=>{

gsap.from(panel.querySelector(".poster-card"),{
y:150,
rotateX:25,
opacity:0,
duration:1.5,
ease:"power3.out",
scrollTrigger:{
trigger:panel,
start:"top center",
end:"bottom center",
scrub:1,
snap:1
}
});

});

document.querySelectorAll(".poster-card").forEach(card=>{

window.addEventListener("mousemove",(e)=>{

let x=(window.innerWidth/2-e.clientX)/30;
let y=(window.innerHeight/2-e.clientY)/30;

card.style.transform=
`rotateY(${x}deg) rotateX(${-y}deg)`;

});

});

const uploadBox=document.getElementById("uploadBox");

uploadBox.addEventListener("dragover",(e)=>{
e.preventDefault();
uploadBox.classList.add("active");
});

uploadBox.addEventListener("dragleave",()=>{
uploadBox.classList.remove("active");
});

uploadBox.addEventListener("drop",(e)=>{
e.preventDefault();

uploadBox.classList.remove("active");

gsap.fromTo(uploadBox,
{scale:1},
{
scale:1.05,
duration:.2,
yoyo:true,
repeat:1
});

});

const music=document.getElementById("bgMusic");
const audioBtn=document.getElementById("audioBtn");

music.volume=0.4;

audioBtn.addEventListener("click",()=>{

if(music.muted){

music.muted=false;

gsap.to(music,{
volume:0.4,
duration:1
});

}else{

gsap.to(music,{
volume:0,
duration:1,
onComplete:()=>{
music.muted=true;
}
});

}

});

</script>
