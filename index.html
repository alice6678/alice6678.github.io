<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TA3LII9A | Luxury Art Prints</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Plus+Jakarta+Sans:wght@300;500&family=Amiri:ital@1&display=swap" rel="stylesheet">
    
    <style>
        /* --- 60% Dominant: Gallery Concrete Background --- */
        :root {
            --bg-color: #f2f2f2;
            --text-main: #151515;
            --accent-color: #b59970;
            --card-bg: #eaeaea;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow: hidden; /* Lock natural scroll for our custom interaction */
            height: 100vh;
            width: 100vw;
        }

        /* --- Elegant Header --- */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 30px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .logo {
            font-family: 'Cinzel', serif;
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: 4px;
            color: var(--text-main);
        }

        .slogan {
            font-family: 'Amiri', serif;
            font-style: italic;
            font-size: 1.1rem;
            color: #666;
            letter-spacing: 1px;
        }

        /* --- Audio Visualizer Widget --- */
        .audio-widget {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }

        .audio-bars {
            display: flex;
            align-items: flex-end;
            gap: 3px;
            height: 18px;
        }

        .bar {
            width: 2px;
            height: 3px;
            background-color: var(--text-main);
            transition: height 0.3s ease;
        }

        .audio-widget.playing .bar {
            animation: pulse 0.8s infinite alternate;
        }
        .audio-widget.playing .bar:nth-child(2) { animation-delay: 0.2s; }
        .audio-widget.playing .bar:nth-child(3) { animation-delay: 0.4s; }

        @keyframes pulse {
            0% { height: 3px; }
            100% { height: 18px; }
        }

        /* --- Main Showcase Container --- */
        .gallery-viewport {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .artwork-container {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transform: scale(0.95) translateY(50px);
            pointer-events: none;
            transition: transform 0.9s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.7s ease;
            padding: 20px;
        }

        .artwork-container.active {
            opacity: 1;
            transform: scale(1) translateY(0);
            pointer-events: auto;
        }

        /* --- The Premium Frame Mockup (30% Secondary Structure) --- */
        .frame-shadow-box {
            background-color: #fff;
            padding: 25px; /* Creates the white matting border around the art */
            box-shadow: 0 30px 60px rgba(0,0,0,0.12), 0 10px 20px rgba(0,0,0,0.06);
            border: 14px solid var(--text-main); /* The Solid Matte Black Frame */
            display: flex;
            justify-content: center;
            align-items: center;
            width: 320px;
            height: 420px;
            transition: transform 0.5s ease;
        }

        .frame-shadow-box:hover {
            transform: scale(1.02) rotate(1deg);
        }

        .inner-canvas {
            width: 100%;
            height: 100%;
            background-color: var(--card-bg);
            background-size: cover;
            background-position: center;
            position: relative;
        }

        /* --- Minimalist Info & CTA (10% Accent) --- */
        .artwork-details {
            margin-top: 30px;
            text-align: center;
            max-width: 400px;
        }

        .art-title {
            font-family: 'Cinzel', serif;
            font-size: 1.3rem;
            letter-spacing: 2px;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .art-meta {
            font-size: 0.9rem;
            color: #777;
            margin-bottom: 15px;
            font-weight: 300;
        }

        .cta-btn {
            display: inline-block;
            padding: 10px 30px;
            border: 1px solid var(--text-main);
            color: var(--text-main);
            text-decoration: none;
            font-size: 0.85rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .cta-btn:hover {
            background-color: var(--text-main);
            color: var(--bg-color);
            border-color: var(--text-main);
        }

        /* --- Micro-instruction Hint --- */
        .scroll-hint {
            position: fixed;
            bottom: 30px;
            font-size: 0.75rem;
            letter-spacing: 3px;
            color: #999;
            text-transform: uppercase;
            animation: float 1.5s infinite alternate;
        }

        @keyframes float {
            0% { transform: translateY(0); }
            100% { transform: translateY(-6px); }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">TA3LII9A</div>
        <div class="slogan">فن يُعلَّق، ليبقى إلى الأبد.</div>
        <div class="audio-widget" id="audioTrigger">
            <div class="audio-bars">
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
            </div>
        </div>
    </header>

    <div class="gallery-viewport" id="viewport">
        <div class="artwork-container active">
            <div class="frame-shadow-box">
                <div class="inner-canvas" style="background-image: url('poster1.jpg');"></div>
            </div>
            <div class="artwork-details">
                <h2 class="art-title">أيقونة رياضية</h2>
                <p class="art-meta">طباعة فاخرة • إطار متين | 70 DH</p>
                <a href="#" class="cta-btn">اطلب الآن</a>
            </div>
        </div>

        <div class="artwork-container">
            <div class="frame-shadow-box">
                <div class="inner-canvas" style="background-image: url('poster2.jpg');"></div>
            </div>
            <div class="artwork-details">
                <h2 class="art-title">ثقافة مغربية</h2>
                <p class="art-meta">لوحة قماشية • إطار كلاسيكي | 70 DH</p>
                <a href="#" class="cta-btn">اطلب الآن</a>
            </div>
        </div>

        <div class="artwork-container">
            <div class="frame-shadow-box">
                <div class="inner-canvas" style="background-image: url('poster3.jpg');"></div>
            </div>
            <div class="artwork-details">
                <h2 class="art-title">فن تجريدي قوطي</h2>
                <p class="art-meta">نسخة محدودة • إطار ملكي | 90 DH</p>
                <a href="#" class="cta-btn">اطلب الآن</a>
            </div>
        </div>
    </div>

    <div class="scroll-hint">اسحب لأعلى للاستكشاف</div>

    <audio id="bgMusic" src="audio.mp3" loop></audio>

    <script>
        // --- Custom stacked gesture navigation ---
        const containers = document.querySelectorAll('.artwork-container');
        let currentIndex = 0;
        let isTransitioning = false;
        let startY = 0;

        function changeArtwork(direction) {
            if (isTransitioning) return;
            
            if (direction === 'next' && currentIndex < containers.length - 1) {
                isTransitioning = true;
                containers[currentIndex].classList.remove('active');
                currentIndex++;
                containers[currentIndex].classList.add('active');
            } else if (direction === 'prev' && currentIndex > 0) {
                isTransitioning = true;
                containers[currentIndex].classList.remove('active');
                currentIndex--;
                containers[currentIndex].classList.add('active');
            }

            setTimeout(() => { isTransitioning = false; }, 900); // Syncs with CSS transition
        }

        // Mouse Wheel Scroll Detection
        window.addEventListener('wheel', (e) => {
            if (e.deltaY > 0) changeArtwork('next');
            else if (e.deltaY < 0) changeArtwork('prev');
        });

        // Mobile Touch Gesture Detection
        window.addEventListener('touchstart', (e) => {
            startY = e.touches[0].clientY;
        });

        window.addEventListener('touchend', (e) => {
            let endY = e.changedTouches[0].clientY;
            let diffY = startY - endY;

            if (Math.abs(diffY) > 50) { // Threshold for swipe
                if (diffY > 0) changeArtwork('next');
                else changeArtwork('prev');
            }
        });

        // --- Audio Widget Control ---
        const audioTrigger = document.getElementById('audioTrigger');
        const bgMusic = document.getElementById('bgMusic');

        audioTrigger.addEventListener('click', () => {
            if (bgMusic.paused) {
                bgMusic.play().catch(err => console.log("Audio play blocked by browser"));
                audioTrigger.classList.add('playing');
            } else {
                bgMusic.pause();
                audioTrigger.classList.remove('playing');
            }
        });
    </script>
</body>
</html>
